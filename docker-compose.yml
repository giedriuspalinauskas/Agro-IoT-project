services:
  web:
    image: nginx:stable-alpine
    container_name: agro-web
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./web:/usr/share/nginx/html:ro

  backend:
    build: ./backend
    container_name: agro-backend
    restart: unless-stopped
    ports:
      - "8002:8000"
    environment:
      DATABASE_URL: postgresql://agro_user:agropass@n8n-postgres:5432/agro_iot
    networks:
      - default
      - n8n-postgres_default

  mqtt-bridge:
    build: ./mqtt-bridge
    container_name: agro-mqtt-bridge
    restart: unless-stopped
    environment:
      MQTT_HOST: chirpstack-docker-mosquitto-1
      MQTT_PORT: "1883"
      API_BASE: http://agro-backend:8000/api
    networks:
      - default
      - n8n-postgres_default
      - chirpstack-docker_default

networks:
  n8n-postgres_default:
    external: true
  chirpstack-docker_default:
    external: true
